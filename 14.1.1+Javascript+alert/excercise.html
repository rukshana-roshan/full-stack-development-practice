<!DOCTYPE html>
<html lang="en">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

<body>
    <script>
        var name = prompt("What is your name?");
        var firstLetterSlice = name.slice(0,1);
        var firtLetterCapitalize = firstLetterSlice.toUpperCase();
        var restofname = name.slice(1,name.length);
        var finalname = firtLetterCapitalize + restofname ;
        alert("Hello"+" ,"+finalname);
    </script>
</body>
